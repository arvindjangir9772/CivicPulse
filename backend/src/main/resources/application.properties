server.port=8081

# Database Configuration (MySQL)
# Set DB_USERNAME and DB_PASSWORD as environment variables, or they default to the values below
spring.datasource.url=jdbc:mysql://localhost:3306/civicpulse_v2_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Arvind@123}

# H2 Console (Disabled since we use MySQL)
spring.h2.console.enabled=false

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# JWT Secret (Should be at least 256 bits)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expirationMs=86400000

# Escalation Schedule (Every 30 seconds for testing, adjust for production)
escalation.cron=*/30 * * * * *
escalation.thresholdDays=3
